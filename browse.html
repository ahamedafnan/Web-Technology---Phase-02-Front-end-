<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniFind - Browse Items</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="home-page">

  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
        <img src="images/lg.png" alt="logo" width="34" height="34" style="object-fit:contain; border-radius:8px;">
        UniFind<span class="brand-dot">.</span>
      </a>

      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div id="nav" class="collapse navbar-collapse">
        <ul class="navbar-nav me-auto">
          <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
          <li class="nav-item"><a class="nav-link active" href="browse.html">Browse Items</a></li>
          <li class="nav-item"><a class="nav-link" href="report.html">Report Item</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <button id="logoutBtn" class="btn btn-brand btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-4">
    <div class="card p-4 mb-4 browse-hero-card">
      <div class="text-center mb-3">
        <h2 class="fw-bold mb-2">Found & Lost Items Gallery</h2>
        <p class="small-muted mb-0">
          Browse items recently discovered across campus. Select an item to claim it.
        </p>
      </div>

      <div class="row g-2 align-items-center justify-content-center mt-2">
        <div class="col-md-5">
          <input id="q" class="form-control" placeholder="Search item name...">
        </div>

        <div class="col-md-2 d-grid">
          <button id="searchBtn" class="btn btn-brand">Search</button>
        </div>

        <div class="col-md-2">
          <select id="sort" class="form-select">
            <option value="new">Newest</option>
            <option value="old">Oldest</option>
          </select>
        </div>

        <div class="col-md-2">
          <select id="typeFilter" class="form-select">
            <option value="all">All</option>
            <option value="lost">Lost</option>
            <option value="found">Found</option>
          </select>
        </div>
      </div>

      <div class="d-flex flex-wrap gap-2 justify-content-center mt-4">
        <button class="btn btn-sm btn-outline-secondary catBtn active-cat" data-cat="All">All</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Electronics">Electronics</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Keys">Keys</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Clothing">Clothing</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Bags">Bags</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Documents">Documents</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Water Bottles">Water Bottles</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Books">Books</button>
        <button class="btn btn-sm btn-outline-secondary catBtn" data-cat="Others">Others</button>
      </div>
    </div>

    <div class="d-flex justify-content-between align-items-center mb-3">
      <p id="showingText" class="small-muted mb-0">Showing 0 items</p>
    </div>

    <div id="grid" class="row g-4"></div>
  </div>

  <footer class="auth-footer text-center pb-4">
    <div class="mb-2">© 2026 UniFind. Rajarata University of Sri Lanka.</div>
    <div class="footer-links">
      <a href="#">Privacy Policy</a>
      <a href="#">Terms of Service</a>
      <a href="#">Campus Security</a>
      <a href="#">Help Center</a>
    </div>
  </footer>

  <script type="module" src="js/browse.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
