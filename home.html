<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniFind - Home</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
      <img src="images/lg.png" alt="logo" width="34" height="34" style="object-fit:contain; border-radius:8px;">
      UniFind<span class="brand-dot">.</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link active" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="browse.html">Browse Items</a></li>
        <li class="nav-item"><a class="nav-link" href="report.html">Report Item</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
      </ul>
      <a href="profile.html" class="nav-user me-2 text-decoration-none">
      <div id="navAvatar" class="nav-avatar">U</div>
      <span id="navUserName">User</span>
      </a>
      <button id="logoutBtn" class="btn btn-brand btn-sm">Logout</button>
    </div>
  </div>
</nav>

<header class="container py-4">
  <div class="card p-4">
    <div class="d-flex flex-wrap gap-3 align-items-center justify-content-between">
      <div>
        <h2 class="fw-bold mb-1">Find & Recover With Ease</h2>
        <div class="small-muted">Search lost/found items inside your campus.</div>
      </div>
      <a class="btn btn-brand" href="report.html">Report Item</a>
    </div>

    <div class="row g-3 mt-3 align-items-center">
      <div class="col-md-6">
        <input id="q" class="form-control" placeholder="Search item name or location...">
      </div>
      <div class="col-md-2 d-grid">
        <button id="searchBtn" class="btn btn-brand">Search</button>
      </div>
      <div class="col-md-4 d-flex gap-2 justify-content-md-end">
        <div class="stats-box">
          <div class="small-muted">Lost Items</div>
          <div class="count" id="lostCount">0</div>
        </div>
        <div class="stats-box">
          <div class="small-muted">Found Items</div>
          <div class="count" id="foundCount">0</div>
        </div>
      </div>
    </div>
  </div>
</header>

<main class="container pb-5">
  <div class="d-flex align-items-center justify-content-between mb-3">
    <h5 class="fw-bold mb-0">Recent Items</h5>
    <a class="small-muted text-decoration-none" href="browse.html">View all</a>
  </div>
  <div id="recentGrid" class="row g-3"></div>
</main>

<script type="module" src="js/home.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
