<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniFind - Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="home-page">

<nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
  <div class="container">
    <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
      <img src="images/lg.png" alt="logo" width="34" height="34" style="object-fit:contain; border-radius:8px;">
      UniFind<span class="brand-dot">.</span>
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div id="nav" class="collapse navbar-collapse">
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="home.html">Home</a></li>
        <li class="nav-item"><a class="nav-link" href="browse.html">Browse Items</a></li>
        <li class="nav-item"><a class="nav-link" href="report.html">Report Item</a></li>
        <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
      </ul>

      <a href="profile.html" class="nav-user me-2 text-decoration-none">
        <div id="navAvatar" class="nav-avatar">U</div>
        <span id="navUserName">User</span>
      </a>

      <button id="logoutBtn" class="btn btn-brand btn-sm">Logout</button>
    </div>
  </div>
</nav>

<div class="container py-5">
  <div class="profile-card mx-auto">
    <div class="text-center mb-4">
      <div id="profileAvatar" class="profile-avatar">U</div>
      <h2 id="profileName" class="fw-bold mt-3 mb-1">User Name</h2>
      <p class="small-muted mb-0">UniFind User Profile</p>
    </div>

    <div class="row g-3">
      <div class="col-md-6">
        <div class="profile-info-box">
          <label class="profile-label">Full Name</label>
          <div id="profileName2" class="profile-value">-</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="profile-info-box">
          <label class="profile-label">Student ID</label>
          <div id="profileStudentId" class="profile-value">-</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="profile-info-box">
          <label class="profile-label">Email</label>
          <div id="profileEmail" class="profile-value">-</div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="profile-info-box">
          <label class="profile-label">Phone</label>
          <div id="profilePhone" class="profile-value">-</div>
        </div>
      </div>
    </div>
  </div>
</div>

<script type="module" src="js/profile.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
