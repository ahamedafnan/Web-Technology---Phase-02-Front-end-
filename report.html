<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniFind - Report Item</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="report-page">

  <nav class="navbar navbar-expand-lg bg-white border-bottom shadow-sm">
    <div class="container">
      <a class="navbar-brand d-flex align-items-center gap-2" href="home.html">
        <img src="images/lg.png" alt="UniFind Logo" width="36" height="36" style="object-fit:contain; border-radius:8px;">
        UniFind<span class="brand-dot">.</span>
      </a>

      <div class="ms-auto d-flex gap-2">
        <a class="btn btn-outline-secondary btn-sm" href="browse.html">Browse</a>
        <button id="logoutBtn" class="btn btn-brand btn-sm">Logout</button>
      </div>
    </div>
  </nav>

  <div class="container py-5">
    <div class="report-wrapper">
      <div class="report-header mb-4">
        <div>
          <h2 class="fw-bold mb-1">Report Item</h2>
          <p class="small-muted mb-0">Fill the form below to report a lost or found item.</p>
        </div>
      </div>

      <form id="reportForm" class="needs-validation" novalidate>
        <!-- Lost / Found Toggle -->
        <div class="mb-4">
          <label class="form-label fw-semibold d-block mb-2">Type</label>
          <div class="report-toggle">
            <input type="radio" class="btn-check" name="type" id="lostType" value="lost" checked>
            <label class="toggle-pill" for="lostType">Lost</label>

            <input type="radio" class="btn-check" name="type" id="foundType" value="found">
            <label class="toggle-pill" for="foundType">Found</label>
          </div>
        </div>

        <div class="row g-4">
          <div class="col-md-6">
            <label class="form-label">Item Name</label>
            <input name="name" class="form-control modern-input" placeholder="Enter item name" required>
            <div class="invalid-feedback">Item name required</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Category</label>
            <select name="category" class="form-select modern-input" required>
              <option value="">Choose...</option>
              <option>Electronics</option>
              <option>Keys</option>
              <option>Clothing</option>
              <option>Bags</option>
              <option>Documents</option>
              <option>Water Bottles</option>
              <option>Books</option>
              <option>Others</option>
            </select>
            <div class="invalid-feedback">Select category</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Location</label>
            <input name="location" class="form-control modern-input" placeholder="Enter location" required>
            <div class="invalid-feedback">Location required</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Date</label>
            <input name="date" type="date" class="form-control modern-input" required>
            <div class="invalid-feedback">Date required</div>
          </div>

          <div class="col-12">
            <label class="form-label">Item Description</label>
            <textarea name="description" class="form-control modern-input" rows="4" placeholder="Describe the item..." required></textarea>
            <div class="invalid-feedback">Description required</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Contact Email</label>
            <input name="contactEmail" type="email" class="form-control modern-input" placeholder="Enter email" required>
            <div class="invalid-feedback">Valid email required</div>
          </div>

          <div class="col-md-6">
            <label class="form-label">Contact Phone</label>
            <input name="contactPhone" class="form-control modern-input" placeholder="Enter phone number" required>
            <div class="invalid-feedback">Phone required</div>
          </div>

          <div class="col-12">
            <label class="form-label">Upload Photo (optional)</label>
            <div class="upload-box">
              <input id="photo" type="file" accept="image/*" class="form-control modern-input">
              <div id="photoPreview" class="photo-preview mt-3"></div>
              <div class="small-muted mt-2">Upload an image if available. A preview will appear below.</div>
            </div>
          </div>
        </div>

        <div class="d-flex gap-2 justify-content-end mt-4">
          <button type="reset" class="btn btn-outline-secondary px-4">Reset</button>
          <button type="submit" class="btn btn-brand px-4">Submit Report</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="js/report.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
