<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>UniFind - Register</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="css/style.css" rel="stylesheet">
</head>
<body class="auth-page">

  <div class="container min-vh-100 d-flex align-items-center justify-content-center py-5">
    <div class="row w-100 justify-content-center">
      <div class="col-md-7 col-lg-5">
        <div class="card auth-card shadow-lg border-0 p-4">
          
          <div class="text-center mb-4">
          <img src="images/lg.png" class="logo-img mx-auto d-block mb-3" alt="UniFind Logo">
            <h2 class="fw-bold mb-1">Create Account</h2>
            <p class="text-muted mb-0">Join UniFind and manage lost & found items easily</p>
          </div>

          <form id="regForm" class="needs-validation" novalidate>
            <div class="mb-3">
              <label class="form-label fw-semibold">Full Name</label>
              <input name="name" type="text" class="form-control custom-input" placeholder="Enter your full name" required>
              <div class="invalid-feedback">Name required</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Email</label>
              <input name="email" type="email" class="form-control custom-input" placeholder="Enter your email" required>
              <div class="invalid-feedback">Valid email required</div>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Password</label>
              <input name="password" type="password" class="form-control custom-input" placeholder="Enter password" minlength="4" required>
              <div class="invalid-feedback">Minimum 4 characters required</div>
            </div>

            <button type="submit" class="btn btn-brand w-100 py-2 mt-2">Register</button>

            <div class="text-center mt-3 small-text">
              Already have an account?
              <a href="index.html" class="login-link">Login</a>
            </div>
          </form>

        </div>
      </div>
       <!-- FOOTER -->
      <footer class="auth-footer text-center pb-3">
        <div class="mb-2">
          © 2026 UniFind. Rajarata University of Sri Lanka.
        </div>
        <div class="footer-links">
          <a href="#">Privacy Policy</a>
          <a href="#">Terms of Service</a>
          <a href="#">Campus Security</a>
          <a href="#">Help Center</a>
        </div>
      </footer>
    </div>
  </div>

  <script>
    (() => {
      'use strict';
      document.querySelectorAll('.needs-validation').forEach(form => {
        form.addEventListener('submit', e => {
          if (!form.checkValidity()) {
            e.preventDefault();
            e.stopPropagation();
          }
          form.classList.add('was-validated');
        }, false);
      });
    })();
  </script>

 <script type="module">
  import { handleRegister } from "./js/auth.js";
  handleRegister("regForm");
</script>
</body>
</html>
